name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.6"
          channel: "stable"

      - name: Create Flutter project
        run: |
          mkdir build_project
          cd build_project
          flutter create telegram_emoji_converter --platforms android

      - name: Copy source files
        run: |
          cp pubspec.yaml build_project/telegram_emoji_converter/pubspec.yaml
          mkdir -p build_project/telegram_emoji_converter/lib
          cp lib/main.dart build_project/telegram_emoji_converter/lib/main.dart

      - name: Set Android minSdkVersion
        run: |
          cd build_project/telegram_emoji_converter
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/g' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/g' android/app/build.gradle
          sed -i 's/minSdkVersion 21/minSdkVersion 24/g' android/app/build.gradle

      - name: Install dependencies
        run: |
          cd build_project/telegram_emoji_converter
          flutter pub get

      - name: Build debug APK
        run: |
          cd build_project/telegram_emoji_converter
          flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: telegram-emoji-converter-apk
          path: build_project/telegram_emoji_converter/build/app/outputs/flutter-apk/app-debug.apk
